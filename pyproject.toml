[tool.ruff]
line-length = 100
target-version = "py310"
# Notebook code review is out of scope for issue #13 (see docs/specs/0017-dev-tooling.md);
# nbstripout (pre-commit) still covers notebook output hygiene.
extend-exclude = ["notebooks"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
