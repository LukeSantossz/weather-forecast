# enforcement.conf — Padrões de debug log por linguagem
# Usado pelo hook pre-commit para detectar logs de debug nos arquivos staged.
# Formato: extensão|padrão_regex (um por linha)
# Linhas iniciando com # são ignoradas.

# JavaScript / TypeScript
js|console\.(log|debug|warn|error|info|trace)\(
ts|console\.(log|debug|warn|error|info|trace)\(
jsx|console\.(log|debug|warn|error|info|trace)\(
tsx|console\.(log|debug|warn|error|info|trace)\(
js|debugger
ts|debugger

# Python
py|print\(
py|breakpoint\(\)
py|pdb\.set_trace\(\)
py|import pdb
py|import ipdb

# Dart / Flutter
dart|print\(
dart|debugPrint\(

# Ruby
rb|puts\s
rb|binding\.pry
rb|byebug

# Go
go|fmt\.Print
go|log\.Print

# Rust
rs|println!\(
rs|dbg!\(

# Java / Kotlin
java|System\.out\.print
kt|println\(
